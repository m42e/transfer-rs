name: Release

on:
  push:
    tags:
      - v*

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Release (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: transfer-rs
            archive: transfer-rs-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: transfer-rs.exe
            archive: transfer-rs-${{ github.ref_name }}-x86_64-pc-windows-msvc.zip
          - os: macos-13
            target: x86_64-apple-darwin
            binary: transfer-rs
            archive: transfer-rs-${{ github.ref_name }}-x86_64-apple-darwin.tar.gz
          - os: macos-14
            target: aarch64-apple-darwin
            binary: transfer-rs
            archive: transfer-rs-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Verify tag matches crate version
        shell: bash
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#v}"
          crate_version="$(cargo pkgid | sed -E 's/.*#//')"
          if [[ "$tag_version" != "$crate_version" ]]; then
            echo "Tag version $tag_version does not match crate version $crate_version" >&2
            exit 1
          fi

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package Unix archive
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          tar -czf "${{ matrix.archive }}" -C "target/${{ matrix.target }}/release" "${{ matrix.binary }}"

      - name: Package Windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path "target/${{ matrix.target }}/release/${{ matrix.binary }}" -DestinationPath "${{ matrix.archive }}"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.archive }}
          fail_on_unmatched_files: true