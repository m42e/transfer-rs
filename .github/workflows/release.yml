name: Release

on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish, including the leading v
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

jobs:
  build:
    name: Build Release (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: transfer-rs
            rust_targets: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: transfer-rs.exe
            rust_targets: x86_64-pc-windows-msvc
          - os: macos-14
            target: x86_64-apple-darwin
            binary: transfer-rs
            rust_targets: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
            binary: transfer-rs
            rust_targets: aarch64-apple-darwin

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
          workspaces: ". -> target/${{ matrix.target }}"
          cache-on-failure: true

      - name: Verify tag matches crate version
        shell: bash
        run: |
          set -euo pipefail
          tag_version="${RELEASE_TAG#v}"
          crate_version="$(cargo pkgid | sed -E 's/.*#//')"
          if [[ "$tag_version" != "$crate_version" ]]; then
            echo "Tag version $tag_version does not match crate version $crate_version" >&2
            exit 1
          fi

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Resolve archive name
        id: archive
        shell: bash
        run: |
          set -euo pipefail
          extension='tar.gz'
          if [[ '${{ runner.os }}' == 'Windows' ]]; then
            extension='zip'
          fi
          echo "name=transfer-rs-${RELEASE_TAG}-${{ matrix.target }}.${extension}" >> "$GITHUB_OUTPUT"

      - name: Package Unix archive
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          tar -czf "${{ steps.archive.outputs.name }}" -C "target/${{ matrix.target }}/release" "${{ matrix.binary }}"

      - name: Package Windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path "target/${{ matrix.target }}/release/${{ matrix.binary }}" -DestinationPath "${{ steps.archive.outputs.name }}"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: ${{ steps.archive.outputs.name }}
          if-no-files-found: error

  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_TAG }}

      - name: Download packaged artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Generate release notes
        id: git-cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: .github/cliff.toml
          args: --latest
        env:
          OUTPUT: release-notes.md

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          body_path: release-notes.md
          files: dist/*
          fail_on_unmatched_files: true
          preserve_order: true