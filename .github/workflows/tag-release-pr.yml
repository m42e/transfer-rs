name: Tag Merged Release PR

on:
  pull_request:
    types:
      - closed

permissions:
  contents: write

jobs:
  tag:
    name: Tag Merged Release PR
    if: >-
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'main' &&
      startsWith(github.event.pull_request.head.ref, 'release/v') &&
      contains(github.event.pull_request.labels.*.name, 'release')
    runs-on: ubuntu-latest

    steps:
      - name: Check out merged commit
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Resolve tag name from crate version
        id: version
        shell: bash
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          git fetch --force --tags origin

          version="$(python3 - <<'PY'
          from pathlib import Path
          import re

          content = Path("Cargo.toml").read_text(encoding="utf-8")
          match = re.search(r"(?ms)^\[package\]\n.*?^version = \"([^\"]+)\"$", content)
          if match is None:
              raise SystemExit("failed to determine crate version from Cargo.toml")
          print(match.group(1))
          PY
          )"
          tag="v$version"
          expected_branch="release/$tag"

          if [[ "$HEAD_REF" != "$expected_branch" ]]; then
            echo "Release branch $HEAD_REF does not match Cargo.toml version $tag" >&2
            exit 1
          fi

          if git rev-parse --verify --quiet "refs/tags/$tag" >/dev/null; then
            echo "Tag already exists: $tag" >&2
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create and push release tag
        shell: bash
        run: |
          set -euo pipefail
          git tag -a "${{ steps.version.outputs.tag }}" "${{ github.event.pull_request.merge_commit_sha }}" -m "${{ steps.version.outputs.tag }}"
          git push origin "refs/tags/${{ steps.version.outputs.tag }}"