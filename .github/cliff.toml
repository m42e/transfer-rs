[changelog]
header = """
"""
body = """
{% if version %}Highlights for transfer-rs {{ version }}.
{% else %}Highlights for the upcoming transfer-rs release.
{% endif %}

{% set breaking_commits = commits | filter(attribute="breaking", value=true) %}
{% if breaking_commits | length > 0 %}
### Breaking Changes
{% for commit in breaking_commits %}
- {% if commit.scope %}{{ commit.scope }}: {% endif %}{{ commit.message | upper_first }}
{% endfor %}
{% endif %}

{% for group, grouped_commits in commits | filter(attribute="breaking", value=false) | group_by(attribute="group") %}
### {{ group }}
{% for commit in grouped_commits %}
- {% if commit.scope %}{{ commit.scope }}: {% endif %}{{ commit.message | upper_first }}
{% endfor %}
{% endfor %}
"""
footer = """
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
protect_breaking_commits = true
filter_commits = true
tag_pattern = "v[0-9].*"
sort_commits = "oldest"
commit_parsers = [
  { message = "^feat(?:\\([^)]+\\))?!?: ", group = "Features" },
  { message = "^fix(?:\\([^)]+\\))?!?: ", group = "Fixes" },
  { message = "^perf(?:\\([^)]+\\))?!?: ", group = "Performance" },
  { message = "^docs?(?:\\([^)]+\\))?!?: ", group = "Documentation" },
  { message = "^refactor(?:\\([^)]+\\))?!?: ", group = "Refactors" },
  { message = "^test(?:\\([^)]+\\))?!?: ", group = "Tests" },
  { message = "^(?:build|ci)(?:\\([^)]+\\))?!?: ", group = "Build and CI" },
  { message = "^(?:chore|revert)(?:\\([^)]+\\))?!?: ", group = "Chores" },
]